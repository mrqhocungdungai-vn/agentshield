version: '3.9'

services:
  gateway:
    build: .
    container_name: agentshield-gateway
    restart: unless-stopped
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - agentshield-logs:/root/.agentshield/logs
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - agentshield

  # Phase 3: Twenty CRM (uncomment when ready)
  # twenty:
  #   image: twentyhq/twenty:latest
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - agentshield

volumes:
  agentshield-logs:

networks:
  agentshield:
    driver: bridge
