# AgentShield Configuration
# Copy this to config.yaml and fill in your values

# Telegram gateway settings
telegram:
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  owner_chat_id: "YOUR_TELEGRAM_USER_ID"  # You — has full permissions

# Underlying agent settings
agent:
  type: hermes  # hermes | openclaw | custom
  path: "~/.hermes"  # Path to your agent installation
  # For custom agents:
  # command: "python3 /path/to/your/agent.py"

# Role definitions
roles:
  owner:
    # Owner has no restrictions — this is you
    chat_ids:
      - "YOUR_TELEGRAM_USER_ID"

  admin:
    # Trusted team members — near-full access
    chat_ids: []
    allow:
      - "*"
    deny:
      - "system:reset"
      - "memory:delete_all"

  user:
    # Paying customers — restricted to business functions
    allow:
      - "chat"
      - "ask"
      - "help"
      - "search"
    deny:
      - "memory:*"
      - "skill:*"
      - "system:*"
    rate_limit:
      messages_per_minute: 10
      messages_per_day: 200

  guest:
    # Free tier or unverified users
    allow:
      - "chat"
      - "help"
    rate_limit:
      messages_per_minute: 3
      messages_per_day: 20

# Default role for new users
default_role: guest

# Logging
logging:
  level: info  # debug | info | warn | error
  file: "~/.agentshield/logs/gateway.log"
  log_conversations: true  # Store conversation history per user
